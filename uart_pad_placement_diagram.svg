<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" font-family="monospace">
  <!-- Background -->
  <rect x="0" y="0" width="900" height="900" fill="#f7f7f7"/>

  <!-- Die outline -->
  <rect x="40" y="40" width="820" height="820" fill="none" stroke="#333" stroke-width="2"/>
  <text x="450" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Die Outline</text>

  <!-- Core area (placeable region, inside pad ring keepout) -->
  <rect x="190" y="190" width="520" height="520" fill="#e8f0fe" stroke="#3366cc" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="18" fill="#3366cc" font-weight="bold">uart_top</text>
  <text x="450" y="472" text-anchor="middle" font-size="12" fill="#3366cc">(sender / receiver / baud_gen)</text>

  <!-- ==================== SOUTH SIDE (bottom) ==================== -->
  <text x="450" y="880" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">SOUTH</text>
  <!-- pads: clk, rst, VDD, VSS, wr_en, rdy_clr -->
  <g font-size="11" text-anchor="middle">
    <rect x="110" y="800" width="60" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="140" y="822">ipad_clk</text>

    <rect x="200" y="800" width="60" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="230" y="822">ipad_rst</text>

    <rect x="290" y="800" width="60" height="35" fill="#ffd6d6" stroke="#a33"/>
    <text x="320" y="822">padvdd_0</text>

    <rect x="380" y="800" width="60" height="35" fill="#d6d6ff" stroke="#33a"/>
    <text x="410" y="822">padvss_0</text>

    <rect x="470" y="800" width="60" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="500" y="815">ipad_</text>
    <text x="500" y="827">wr_en</text>

    <rect x="560" y="800" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="595" y="815">ipad_</text>
    <text x="595" y="827">rdy_clr</text>
  </g>

  <!-- ==================== NORTH SIDE (top) ==================== -->
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">NORTH</text>
  <!-- pads: rdy, busy, VDD, VSS -->
  <g font-size="11" text-anchor="middle">
    <rect x="250" y="70" width="60" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="280" y="92">opad_rdy</text>

    <rect x="340" y="70" width="60" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="370" y="92">opad_busy</text>

    <rect x="430" y="70" width="60" height="35" fill="#ffd6d6" stroke="#a33"/>
    <text x="460" y="92">padvdd_2</text>

    <rect x="520" y="70" width="60" height="35" fill="#d6d6ff" stroke="#33a"/>
    <text x="550" y="92">padvss_2</text>
  </g>

  <!-- ==================== EAST SIDE (right) ==================== -->
  <text x="850" y="450" text-anchor="middle" font-size="13" fill="#555" font-weight="bold" transform="rotate(90 850 450)">EAST</text>
  <!-- pads: data_in[0:3], VDD, VSS, data_in[4:7] -->
  <g font-size="10" text-anchor="middle">
    <rect x="750" y="120" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="142">data_in_0</text>

    <rect x="750" y="165" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="187">data_in_1</text>

    <rect x="750" y="210" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="232">data_in_2</text>

    <rect x="750" y="255" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="277">data_in_3</text>

    <rect x="750" y="300" width="70" height="35" fill="#ffd6d6" stroke="#a33"/>
    <text x="785" y="322">padvdd_1</text>

    <rect x="750" y="345" width="70" height="35" fill="#d6d6ff" stroke="#33a"/>
    <text x="785" y="367">padvss_1</text>

    <rect x="750" y="390" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="412">data_in_4</text>

    <rect x="750" y="435" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="457">data_in_5</text>

    <rect x="750" y="480" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="502">data_in_6</text>

    <rect x="750" y="525" width="70" height="35" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="785" y="547">data_in_7</text>
  </g>

  <!-- ==================== WEST SIDE (left) ==================== -->
  <text x="50" y="450" text-anchor="middle" font-size="13" fill="#555" font-weight="bold" transform="rotate(-90 50 450)">WEST</text>
  <!-- pads: data_out[0:3], VDD, VSS, data_out[4:7] -->
  <g font-size="10" text-anchor="middle">
    <rect x="80" y="120" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="142">data_out_0</text>

    <rect x="80" y="165" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="187">data_out_1</text>

    <rect x="80" y="210" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="232">data_out_2</text>

    <rect x="80" y="255" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="277">data_out_3</text>

    <rect x="80" y="300" width="70" height="35" fill="#ffd6d6" stroke="#a33"/>
    <text x="115" y="322">padvdd_3</text>

    <rect x="80" y="345" width="70" height="35" fill="#d6d6ff" stroke="#33a"/>
    <text x="115" y="367">padvss_3</text>

    <rect x="80" y="390" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="412">data_out_4</text>

    <rect x="80" y="435" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="457">data_out_5</text>

    <rect x="80" y="480" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="502">data_out_6</text>

    <rect x="80" y="525" width="70" height="35" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="115" y="547">data_out_7</text>
  </g>

  <!-- ==================== Corner pads ==================== -->
  <g font-size="10" text-anchor="middle" fill="#555">
    <rect x="50" y="50" width="45" height="45" fill="#ddd" stroke="#777"/>
    <text x="72" y="76">NW</text>

    <rect x="805" y="50" width="45" height="45" fill="#ddd" stroke="#777"/>
    <text x="827" y="76">NE</text>

    <rect x="50" y="805" width="45" height="45" fill="#ddd" stroke="#777"/>
    <text x="72" y="831">SW</text>

    <rect x="805" y="805" width="45" height="45" fill="#ddd" stroke="#777"/>
    <text x="827" y="831">SE</text>
  </g>

  <!-- Legend -->
  <g font-size="11">
    <rect x="60" y="855" width="14" height="14" fill="#cde7cd" stroke="#2a7a2a"/>
    <text x="80" y="866">input pad</text>

    <rect x="170" y="855" width="14" height="14" fill="#ffe0b3" stroke="#a66a00"/>
    <text x="190" y="866">output pad</text>

    <rect x="290" y="855" width="14" height="14" fill="#ffd6d6" stroke="#a33"/>
    <text x="310" y="866">VDD pad</text>

    <rect x="390" y="855" width="14" height="14" fill="#d6d6ff" stroke="#33a"/>
    <text x="410" y="866">VSS pad</text>
  </g>
</svg>
